name: Build DLL

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v4
    
    - uses: ilammy/msvc-dev-cmd@v1
    
    - name: Compile
      shell: cmd
      run: |
        cl /nologo /LD /EHsc /O2 /MT /Fe:PSO_Dumper.dll main.cpp /link psapi.lib shell32.lib user32.lib
        
    - uses: actions/upload-artifact@v4
      with:
        name: PSO_Dumper
        path: PSO_Dumper.dll
